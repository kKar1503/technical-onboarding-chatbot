name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: 1.13.2
  ENVIRONMENT: dev

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Uncomment to use OIDC instead of access keys (recommended):
      # id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # OIDC alternative (remove the two lines above and uncomment below):
          # role-to-assume: arn:aws:iam::<account-id>:role/github-actions-deploy
          # aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------
      # Terraform runs first with the CURRENT image; it never rewrites
      # the task-def image tag (services have `ignore_changes =
      # [task_definition]`). CI then rolls out the new image in a
      # separate step by registering a new task-def revision.
      # -----------------------------------------------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply (infrastructure only)
        working-directory: infra
        env:
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_gitlab_webhook_secret: ${{ secrets.TF_VAR_gitlab_webhook_secret }}
          TF_VAR_gitlab_access_token: ${{ secrets.TF_VAR_gitlab_access_token }}
        run: terraform apply -auto-approve

      - name: Read deploy targets from Terraform
        id: tf
        working-directory: infra
        run: |
          {
            echo "ECR_REPO=$(terraform output -raw ecr_repository_url)"
            echo "CLUSTER=$(terraform output -raw ecs_cluster_name)"
            echo "NEXTJS_SERVICE=$(terraform output -raw nextjs_service_name)"
            echo "WORKER_SERVICE=$(terraform output -raw worker_service_name)"
            echo "NEXTJS_FAMILY=$(terraform output -raw nextjs_task_family)"
            echo "WORKER_FAMILY=$(terraform output -raw worker_task_family)"
          } >> $GITHUB_OUTPUT

      - name: Build and push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: nextjs
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tf.outputs.ECR_REPO }}:nextjs-${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tf.outputs.ECR_REPO }}:worker-${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Register new Next.js task definition revision
        id: nextjs_td
        run: |
          NEW_IMAGE="${{ steps.tf.outputs.ECR_REPO }}:nextjs-${{ steps.tag.outputs.IMAGE_TAG }}"
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.tf.outputs.NEXTJS_FAMILY }}" \
            --query 'taskDefinition')
          NEW_TD=$(echo "$CURRENT" | jq --arg IMG "$NEW_IMAGE" '
            .containerDefinitions[0].image = $IMG
            | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
               volumes, placementConstraints, requiresCompatibilities, cpu, memory, tags,
               runtimePlatform}
            | with_entries(select(.value != null and .value != []))')
          ARN=$(echo "$NEW_TD" | aws ecs register-task-definition --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TD_ARN=$ARN" >> $GITHUB_OUTPUT

      - name: Register new worker task definition revision
        id: worker_td
        run: |
          NEW_IMAGE="${{ steps.tf.outputs.ECR_REPO }}:worker-${{ steps.tag.outputs.IMAGE_TAG }}"
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.tf.outputs.WORKER_FAMILY }}" \
            --query 'taskDefinition')
          NEW_TD=$(echo "$CURRENT" | jq --arg IMG "$NEW_IMAGE" '
            .containerDefinitions[0].image = $IMG
            | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
               volumes, placementConstraints, requiresCompatibilities, cpu, memory, tags,
               runtimePlatform}
            | with_entries(select(.value != null and .value != []))')
          ARN=$(echo "$NEW_TD" | aws ecs register-task-definition --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TD_ARN=$ARN" >> $GITHUB_OUTPUT

      - name: Update Next.js service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.CLUSTER }}" \
            --service "${{ steps.tf.outputs.NEXTJS_SERVICE }}" \
            --task-definition "${{ steps.nextjs_td.outputs.TD_ARN }}" >/dev/null

      - name: Update worker service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.CLUSTER }}" \
            --service "${{ steps.tf.outputs.WORKER_SERVICE }}" \
            --task-definition "${{ steps.worker_td.outputs.TD_ARN }}" >/dev/null

      - name: Wait for Next.js deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.tf.outputs.CLUSTER }}" \
            --services "${{ steps.tf.outputs.NEXTJS_SERVICE }}"

      - name: Deployment summary
        run: |
          cd infra
          {
            echo "## Deployment successful"
            echo "- Image tag: \`${{ steps.tag.outputs.IMAGE_TAG }}\`"
            echo "- Next.js TD: \`${{ steps.nextjs_td.outputs.TD_ARN }}\`"
            echo "- Worker TD: \`${{ steps.worker_td.outputs.TD_ARN }}\`"
            echo "- ALB: $(terraform output -raw alb_dns_name)"
          } >> $GITHUB_STEP_SUMMARY
